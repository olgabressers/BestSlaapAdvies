<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image — BesteSlaapAdvies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: linear-gradient(135deg, #082e3f 0%, #0d3d52 48%, #1a5570 100%);
      color: white;
      font-family: Georgia, 'Times New Roman', serif;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(217,197,142,.12) 0%, transparent 55%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 90%, rgba(217,197,142,.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .frame {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 80px;
    }
    .logo {
      font-size: 72px;
      font-weight: 400;
      letter-spacing: -1.2px;
      color: white;
      margin-bottom: 48px;
      line-height: 1;
    }
    .logo em { font-style: italic; color: #d9c58e; font-weight: 400; }
    .rule {
      width: 80px;
      height: 1px;
      background: #d9c58e;
      margin: 0 auto 36px;
      opacity: 0.6;
    }
    .tagline {
      font-size: 36px;
      font-style: italic;
      font-weight: 400;
      color: rgba(255,255,255,.88);
      letter-spacing: 0.2px;
      line-height: 1.3;
    }
    .tagline em {
      font-style: italic;
      color: #d9c58e;
      font-weight: 400;
    }
    .domain {
      position: absolute;
      bottom: 44px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: rgba(217,197,142,.85);
      letter-spacing: 5px;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="logo">Beste<em>Slaap</em>Advies</div>
    <div class="rule"></div>
    <div class="tagline">Beter slapen <em>begint hier.</em></div>
  </div>
  <div class="domain">besteslaapadvies.nl</div>
</body>
</html>
